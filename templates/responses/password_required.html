<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accès protégé — {{ sondage.titre }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:420px;">
  <div class="card shadow-sm">
    <div class="card-body p-4 text-center">
      <i class="bi bi-lock-fill text-warning" style="font-size:3rem;"></i>
      <h4 class="mt-3">Sondage protégé</h4>
      <p class="text-muted">Ce sondage est protégé par un mot de passe.</p>
      {% if erreur %}
      <div class="alert alert-danger">Mot de passe incorrect. Réessayez.</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3 text-start">
          <label class="form-label">Mot de passe</label>
          {{ form.mot_de_passe }}
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-unlock me-1"></i>Accéder au sondage
        </button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
