{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Nouveau sondage — SondagesApp{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{% url 'surveys:list' %}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Nouveau sondage</h2>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-header"><h6 class="mb-0">Informations générales</h6></div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {% crispy form %}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-arrow-right-circle me-1"></i>Créer et ajouter des questions
            </button>
            <a href="{% url 'surveys:list' %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
